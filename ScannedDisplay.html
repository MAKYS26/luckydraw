<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanned Tickets – MAKYS Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #14141f;
            --accent: #22c55e;
            --text: #f0f0f0;
            --text-muted: rgba(255,255,255,0.6);
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .header {
            position: relative;
            text-align: left;
            padding: 20px 100px 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            margin: 0 0 6px 0;
            color: var(--text);
        }
        .header .subtitle {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            color: var(--text-muted);
            margin: 0;
        }
        .total-badge {
            position: absolute;
            top: 50%;
            right: 24px;
            transform: translateY(-50%);
            padding: 8px 20px;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            font-size: clamp(1rem, 3vw, 1.75rem);
            border-radius: 999px;
        }
        .grid-container {
            padding: 28px 24px 56px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .ticket-card {
            background: var(--card-bg);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            padding: 28px 20px;
            text-align: center;
            font-weight: 600;
            font-size: clamp(2.96rem, 7.61vw, 4.65rem);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .ticket-card:hover {
            border-color: rgba(34, 197, 94, 0.7);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.15);
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: clamp(1.35rem, 3vw, 1.75rem);
        }
        .empty-state i {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem('staffAuth'))location.replace('StaffLogin.html');</script>
    <div class="header">
        <h1>Scanned Tickets</h1>
        <p class="subtitle">Live from all scanners</p>
        <div class="total-badge" id="totalCount">0</div>
    </div>

    <div class="grid-container" id="grid"></div>
    <div class="empty-state" id="emptyState" style="display: none;">
        <i class="fas fa-qrcode"></i>
        <p>No tickets scanned yet. Scans from all devices will appear here.</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5Vuf0oNnh4imHtZs9jnkVWC9VxrDkLjA",
            authDomain: "makysdraw-87237.firebaseapp.com",
            databaseURL: "https://makysdraw-87237-default-rtdb.firebaseio.com",
            projectId: "makysdraw-87237",
            storageBucket: "makysdraw-87237.firebasestorage.app",
            messagingSenderId: "1044977366090",
            appId: "1:1044977366090:web:37af3eaa9c3f5bfc7822b3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const gridEl = document.getElementById('grid');
        const totalEl = document.getElementById('totalCount');
        const emptyEl = document.getElementById('emptyState');

        function normalizeItem(item) {
            if (item == null) return '';
            if (typeof item === 'object' && item !== null && item.data != null) return String(item.data);
            return String(item);
        }

        database.ref('drawResults/items').on('value', (snapshot) => {
            const raw = snapshot.val();
            const items = [];
            if (raw && Array.isArray(raw)) {
                raw.forEach((item) => {
                    const s = normalizeItem(item).trim();
                    if (s) items.push(s);
                });
                items.reverse(); // Newest first (same as Scanner01)
            }

            totalEl.textContent = items.length;
            emptyEl.style.display = items.length === 0 ? 'block' : 'none';
            gridEl.style.display = items.length === 0 ? 'none' : 'grid';

            gridEl.innerHTML = '';
            items.forEach((content) => {
                const card = document.createElement('div');
                card.className = 'ticket-card';
                card.textContent = content;
                gridEl.appendChild(card);
            });
        });
    </script>
</body>
</html>
