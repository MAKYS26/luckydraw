<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login – MAKYS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: #030637;
            background-image: linear-gradient(135deg, #030637 0%, #0a0a2e 50%, #050520 100%);
            color: #f5f5f5;
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
        }
        .login-box {
            max-width: 360px;
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            text-align: center;
        }
        .login-box p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 24px;
        }
        .login-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            box-sizing: border-box;
        }
        .login-box input:focus {
            outline: none;
            border-color: #c9a227;
            box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.25);
        }
        .login-box .btn-login {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .login-box .btn-login:hover { opacity: 0.95; color: #fff; }
        .login-box .error {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Staff Access</h1>
        <p>Enter the staff password to continue.</p>
        <form id="loginForm" onsubmit="return false;">
            <label for="staffPassword">Password</label>
            <input type="password" id="staffPassword" placeholder="Password" autocomplete="current-password" autofocus>
            <button type="submit" class="btn-login">Log in</button>
            <p class="error" id="loginError">Incorrect password.</p>
        </form>
    </div>
    <script>
        (function() {
            // Change this password; keep it secret. Staff only.
            var STAFF_PASSWORD = 'malam';
            var form = document.getElementById('loginForm');
            var input = document.getElementById('staffPassword');
            var errEl = document.getElementById('loginError');

            form.addEventListener('submit', function() {
                errEl.style.display = 'none';
                if (input.value === STAFF_PASSWORD) {
                    try { sessionStorage.setItem('staffAuth', '1'); } catch (e) {}
                    window.location.href = 'index.html';
                } else {
                    errEl.style.display = 'block';
                    input.focus();
                }
            });
        })();
    </script>
</body>
</html>
