<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030637">
    <title>Check My Lucky Number – MAKYS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030637;
            --card-bg: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            --accent: #c9a227;
            --accent-glow: rgba(201, 162, 39, 0.25);
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.12);
            --text: #f5f5f5;
            --text-muted: rgba(255,255,255,0.72);
        }
        * { box-sizing: border-box; }
        html {
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            height: 100%;
            /* Fit to visible viewport on mobile (address bar etc.) */
            min-height: 100vh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
        }
        body {
            min-height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            background: var(--bg);
            background-image: linear-gradient(135deg, #030637 0%, #0a0a2e 50%, #050520 100%);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            padding-left: max(24px, env(safe-area-inset-left));
            padding-right: max(24px, env(safe-area-inset-right));
            padding-bottom: env(safe-area-inset-bottom);
        }
        body .container-custom {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: max(clamp(12px, 3vh, 28px), env(safe-area-inset-top)) clamp(16px, 4vw, 24px) clamp(24px, 5vh, 48px);
        }
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }
        .container-custom {
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
        }
        .page-header {
            text-align: center;
            margin-bottom: clamp(16px, 4vh, 32px);
            flex-shrink: 0;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.35rem, 5vw, 2rem);
            margin: 0 0 6px 0;
            color: var(--text);
            letter-spacing: 0.02em;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            line-height: 1.25;
        }
        .subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: clamp(0.875rem, 2.5vw, 1.05rem);
            line-height: 1.4;
        }
        .card-panel {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: clamp(14px, 4vw, 20px);
            padding: clamp(20px, 5vw, 36px) clamp(20px, 4vw, 32px);
            margin-bottom: clamp(12px, 3vh, 24px);
            overflow: visible;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
            flex: 1 1 auto;
            min-height: 0;
        }
        .form-label {
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: clamp(6px, 1.5vh, 10px);
            display: block;
            font-size: clamp(0.9rem, 2.5vw, 0.98rem);
        }
        .form-control {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: #ffffff;
            padding: clamp(12px, 2.5vh, 16px) clamp(14px, 4vw, 20px);
            min-height: 48px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 500;
            border-radius: clamp(10px, 2.5vw, 12px);
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .form-control:focus {
            outline: none;
            background: rgba(255,255,255,0.15);
            border-color: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .check-btn-wrap {
            margin-top: clamp(16px, 3vh, 24px);
            margin-bottom: 4px;
        }
        .check-btn-wrap a {
            display: block;
            text-align: center;
            width: 100%;
            min-height: 48px;
            line-height: 48px;
            padding: 0 clamp(16px, 4vw, 24px);
            font-size: clamp(1rem, 4vw, 1.15rem);
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .check-btn-wrap a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.45);
            color: #fff;
        }
        .loading-msg {
            color: var(--text-muted);
            font-size: clamp(0.8rem, 2.2vw, 0.9rem);
            margin-top: clamp(10px, 2vh, 16px);
            min-height: 1.4em;
        }
        .result-box {
            margin-top: clamp(16px, 3vh, 28px);
            padding: clamp(18px, 4vw, 28px) clamp(18px, 4vw, 24px);
            border-radius: clamp(12px, 3vw, 16px);
            display: none;
            text-align: center;
            transition: opacity 0.3s ease;
        }
        .result-box.show { display: block; }
        .result-box.win {
            background: var(--success-bg);
            border: 1px solid rgba(34, 197, 94, 0.4);
            box-shadow: 0 0 24px rgba(34, 197, 94, 0.15);
        }
        .result-box.nowin {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .result-box .icon {
            font-size: clamp(2.5rem, 8vw, 3.25rem);
            margin-bottom: clamp(8px, 2vh, 14px);
            display: block;
        }
        .result-box.win .icon { color: var(--success); }
        .result-box.nowin .icon { color: var(--text-muted); }
        .result-box .title {
            font-size: clamp(1.05rem, 4vw, 1.3rem);
            font-weight: 700;
            margin-bottom: clamp(6px, 1.5vh, 10px);
            line-height: 1.35;
        }
        .result-box .prize-name {
            font-size: clamp(0.95rem, 3.5vw, 1.15rem);
            color: var(--accent);
            margin-top: clamp(6px, 1.5vh, 10px);
            font-weight: 600;
            word-break: break-word;
        }
        .result-box .prize-num {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            color: var(--text-muted);
            margin-top: 4px;
        }
        .counter-claim-card {
            margin-top: clamp(12px, 2.5vh, 20px);
            padding: clamp(14px, 3vw, 18px) clamp(16px, 4vw, 20px);
            background: rgba(201, 162, 39, 0.18);
            border: 2px solid var(--accent);
            border-radius: clamp(10px, 2.5vw, 12px);
            text-align: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .counter-claim-card .claim-title {
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .counter-claim-card .claim-counter {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 700;
            color: var(--accent);
        }

        /* Small phones: fit to screen */
        @media (max-width: 480px) {
            .page-header { margin-bottom: clamp(12px, 2.5vh, 20px); }
        }
        @media (max-height: 600px) {
            .page-header { margin-bottom: 10px; }
            .page-header h1 { margin-bottom: 4px; }
            .check-btn-wrap { margin-top: 12px; }
            .result-box { margin-top: 16px; padding: 16px 18px; }
            .result-box .icon { font-size: 2.25rem; margin-bottom: 8px; }
            .counter-claim-card { margin-top: 12px; padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div class="container-custom">
        <header class="page-header">
            <h1>Check My Lucky Number</h1>
            <p class="subtitle">Enter your ticket number to see if you won a prize.</p>
        </header>

        <div class="card-panel">
            <label for="luckyNumber" class="form-label">Your lucky number / ticket number</label>
            <input type="text" class="form-control" id="luckyNumber" placeholder="e.g. 1023" autocomplete="off">

            <div class="check-btn-wrap">
                <a href="#" id="checkBtn">Check</a>
            </div>

            <p class="loading-msg" id="loadingMsg">Loading draw results…</p>

            <div class="result-box" id="resultBox">
                <div class="icon" id="resultIcon"></div>
                <div class="title" id="resultTitle"></div>
                <div class="prize-name" id="resultPrize"></div>
                <div class="prize-num" id="resultPrizeNum"></div>
                <div class="counter-claim-card" id="resultCounter" style="display: none;">
                    <div class="claim-title">Claim your prize at</div>
                    <div class="claim-counter" id="resultCounterNum"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5Vuf0oNnh4imHtZs9jnkVWC9VxrDkLjA",
            authDomain: "makysdraw-87237.firebaseapp.com",
            databaseURL: "https://makysdraw-87237-default-rtdb.firebaseio.com",
            projectId: "makysdraw-87237",
            storageBucket: "makysdraw-87237.firebasestorage.app",
            messagingSenderId: "1044977366090",
            appId: "1:1044977366090:web:37af3eaa9c3f5bfc7822b3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let prizes = [];
        let flattenedWinners = [];

        function firebaseToArray(val) {
            if (!val || typeof val !== 'object') return [];
            if (Array.isArray(val)) return val;
            return Object.keys(val)
                .filter(k => /^\d+$/.test(k))
                .sort((a, b) => parseInt(a) - parseInt(b))
                .map(k => val[k]);
        }

        function loadDrawData() {
            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('resultBox').classList.remove('show');

            Promise.all([
                database.ref('drawResults/prizes').once('value'),
                database.ref('drawResults/allResults').once('value')
            ]).then(([prizeSnap, resultsSnap]) => {
                prizes = firebaseToArray(prizeSnap.val());
                const results = firebaseToArray(resultsSnap.val());
                flattenedWinners = results.flatMap(r => {
                    const s = typeof r === 'string' ? r : String(r);
                    return s.split(/,\s*/).map(w => String(w).trim()).filter(Boolean);
                });
                document.getElementById('loadingMsg').style.display = 'none';
            }).catch(() => {
                document.getElementById('loadingMsg').textContent = 'Could not load draw results. Try again later.';
            });
        }

        function getCounterForPrize(prizeNum) {
            if (prizeNum >= 1 && prizeNum <= 50) return 1;
            if (prizeNum >= 51 && prizeNum <= 100) return 2;
            if (prizeNum >= 101 && prizeNum <= 150) return 3;
            if (prizeNum >= 151 && prizeNum <= 200) return 4;
            return null;
        }

        function showResult(won, prizeIndex, prizeName) {
            const box = document.getElementById('resultBox');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const prizeEl = document.getElementById('resultPrize');
            const prizeNumEl = document.getElementById('resultPrizeNum');
            const counterCard = document.getElementById('resultCounter');
            const counterNumEl = document.getElementById('resultCounterNum');

            box.classList.remove('win', 'nowin');
            prizeEl.style.display = 'none';
            prizeNumEl.style.display = 'none';
            counterCard.style.display = 'none';

            if (won) {
                box.classList.add('win');
                icon.className = 'icon fas fa-trophy';
                icon.textContent = '';
                title.textContent = 'Congratulations! You won!';
                prizeEl.textContent = prizeName || ('Prize #' + (prizeIndex + 1));
                prizeNumEl.textContent = 'Prize #' + (prizeIndex + 1);
                prizeEl.style.display = 'block';
                prizeNumEl.style.display = 'block';

                const prizeNum = prizeIndex + 1;
                const counter = getCounterForPrize(prizeNum);
                if (counter !== null) {
                    counterNumEl.textContent = 'Counter #' + counter;
                    counterCard.style.display = 'block';
                }
            } else {
                box.classList.add('nowin');
                icon.className = 'icon';
                icon.textContent = '😢';
                title.innerHTML = 'Sorry<br>Try Again Next Year';
            }
            box.classList.add('show');
        }

        function check() {
            const input = document.getElementById('luckyNumber');
            const value = String(input.value).trim();
            if (!value) {
                showResult(false);
                return;
            }
            const normalized = value.toLowerCase();
            const index = flattenedWinners.findIndex(w => String(w).trim().toLowerCase() === normalized);
            if (index >= 0) {
                const prizeName = (prizes[index] || '').trim() || ('Prize #' + (index + 1));
                showResult(true, index, prizeName);
            } else {
                showResult(false);
            }
        }

        loadDrawData();

        document.getElementById('checkBtn').addEventListener('click', function(e) {
            e.preventDefault();
            check();
        });
        document.getElementById('luckyNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); check(); }
        });
    </script>
</body>
</html>
